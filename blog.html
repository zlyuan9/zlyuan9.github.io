<body data-page="blog">

  <!-- ===== Top bar ===== -->
  <div id="bar">
    <nav id="tags"></nav>
    <div id="bar-right">
      <div id="status">
        <span id="statusTime">--:--:--</span>
        <span class="sep date">·</span>
        <span id="statusDate" class="date">----------</span>
        <span id="visitorCount" style="display:none"></span>
      </div>
      <button id="theme-toggle" type="button">☾ dark</button>
    </div>
  </div>

  <!-- ===== Desktop decorative art ===== -->
  <img class="bg-art art-plant" src="/assets/plant.png" alt="" aria-hidden="true">
  <img class="bg-art art-butterfly" src="/assets/butterfly.png" alt="" aria-hidden="true">

  <div class="corner">
    <div class="clock-box">
      <svg viewBox="0 0 100 100" aria-label="analog clock">
        <g id="clockTicks"></g>
        <line id="handHour" class="clock-hand" x1="50" y1="50" x2="50" y2="24" stroke-linecap="round"/>
        <line id="handMin"  class="clock-hand" x1="50" y1="50" x2="50" y2="12" stroke-linecap="round"/>
        <line id="handSec"  class="clock-hand" x1="50" y1="50" x2="50" y2="8"  stroke-linecap="round"/>
        <circle class="clock-pin" cx="50" cy="50" r="1.8"/>
      </svg>
    </div>
    <div class="kanji-text" aria-label="赵李元">赵李元</div>
  </div>

  <!-- ===== Content window ===== -->
  <main id="desktop">
    <section class="win">
      <div class="win-title">
        <span>blog</span>
        <span class="win-dots">— □ ×</span>
      </div>
      <div class="win-body">
        <div class="content markdown">
          <h1>Blog</h1>
          <p class="post-meta">notes on agents, evals, and whatever else.</p>

          <ul class="post-list">
            <li>
              <a href="/blog/building-evals-for-agents.html">Building evals for agents</a>
              <span class="post-date">2026-06</span>
              <p>Why most agent benchmarks fail, and the three properties I look for in one that doesn't.</p>
            </li>
          </ul>
        </div>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>

</html>
